# 此檔案位於 .github/workflows/daily.yml
# 排程已改由外部觸發器（cron-job.org）準點呼叫，不再使用 GitHub 內建的 schedule
name: 每日財經日報

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "執行模式（正式=含訂閱者且休市不寄／測試=只寄自己且休市照跑）"
        type: choice
        required: false
        default: auto
        options:
          - auto
          - test

permissions:
  contents: read
  models: read              # 讓 GITHUB_TOKEN 能免費呼叫 GitHub Models（AI 摘要）

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SUBSCRIBERS_URL: ${{ secrets.SUBSCRIBERS_URL }}    # 訂閱名單小窗口
      TEST_RECIPIENTS: ${{ secrets.TEST_RECIPIENTS }}    # 測試用的自己人信箱，逗號分隔
      RUN_MODE: ${{ inputs.mode || 'auto' }}             # 外部觸發沒帶參數時預設正式模式
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install yfinance feedparser requests

      - name: 產生並寄送中文版日報
        run: python daily_report.py

      - name: 產生並寄送英文版日報
        if: always()       # 中文版失敗也照寄英文版，互不牽連
        run: python daily_report_en.py
