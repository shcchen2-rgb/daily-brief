# 此檔案位於 .github/workflows/daily.yml
name: 每日財經日報

on:
  schedule:
    # GitHub 排程只認 UTC，因此設兩組對應洛杉磯的冬夏令時間，
    # 程式內會自動判斷「當地是否為晚上 7 點」，只有一組會真正執行
    - cron: "0 2 * * *"   # UTC 02:00 = 夏令 PDT 19:00
    - cron: "0 3 * * *"   # UTC 03:00 = 冬令 PST 19:00
  workflow_dispatch:       # 允許在 Actions 頁面手動觸發（測試用）

permissions:
  contents: read
  models: read             # 讓 GITHUB_TOKEN 能免費呼叫 GitHub Models（AI 摘要）

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:                   # 兩個版本共用同一組鑰匙，放在 job 層級不用重複寫
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install yfinance feedparser requests

      - name: 產生並寄送中文版日報
        run: python daily_report.py

      - name: 產生並寄送英文版日報
        if: always()       # 就算中文版失敗，英文版照寄（反之亦然，互不牽連）
        run: python daily_report_en.py
